name: CI

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/ci.yml

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: ghcr.io/trionnemesis/argocd-orbstack-cicd-demo:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/trionnemesis/argocd-orbstack-cicd-demo

      - name: Update Kubernetes image tag
        run: |
          sed -i "s#image: .*#image: ghcr.io/trionnemesis/argocd-orbstack-cicd-demo:${GITHUB_SHA}#" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${GITHUB_SHA}" || exit 0
          git push
