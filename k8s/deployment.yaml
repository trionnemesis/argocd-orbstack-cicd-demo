apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-orbstack-cicd-demo
  labels:
    app: argocd-orbstack-cicd-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-orbstack-cicd-demo
  template:
    metadata:
      labels:
        app: argocd-orbstack-cicd-demo
    spec:
      containers:
        - name: web
          image: ghcr.io/trionnemesis/argocd-orbstack-cicd-demo:11d47fc4d3915e1b75c895faf9224b44721a4384
          ports:
            - containerPort: 80
